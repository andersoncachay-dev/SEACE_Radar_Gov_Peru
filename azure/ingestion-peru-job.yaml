name: govradar-ingestion-peru
properties:
  configuration:
    triggerType: Schedule
    scheduleTriggerConfig:
      cronExpression: "* * * * *"
      parallelism: 1
      replicaCompletionCount: 1
    replicaTimeout: 840
    replicaRetryLimit: 1
    secrets:
      - name: database-url
      - name: outbound-proxy-url
        keyVaultUrl: https://govradarkv923fd1.vault.azure.net/secrets/outbound-proxy-url
        identity: /subscriptions/c30a5d21-73f1-44a2-a16f-923fd18a3706/resourcegroups/govradar-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/govradar-identity
  template:
    containers:
      - name: ingestion-peru
        image: REGISTRY_NAME.azurecr.io/govradar-api:IMAGE_TAG
        command: [/app/azure/run-ingestion-worker.sh]
        resources:
          cpu: 1.0
          memory: 2Gi
        env:
          - name: ENVIRONMENT
            value: azure
          - name: DATABASE_URL
            secretRef: database-url
          - name: OUTBOUND_PROXY_URL
            secretRef: outbound-proxy-url
          - name: INGESTION_COUNTRY
            value: peru
          - name: ENABLE_SCHEDULER
            value: "false"
          - name: AUTO_SEND_ALERTS
            value: "false"
          - name: ENABLE_MENOR8_MODULE
            value: "false"

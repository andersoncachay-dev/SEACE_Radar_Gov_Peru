name: govradar-ingestion-chile
properties:
  configuration:
    triggerType: Schedule
    scheduleTriggerConfig:
      cronExpression: "* * * * *"
      parallelism: 1
      replicaCompletionCount: 1
    replicaTimeout: 840
    replicaRetryLimit: 1
  template:
    containers:
      - name: ingestion-chile
        image: REGISTRY_NAME.azurecr.io/govradar-api:IMAGE_TAG
        command: [/app/azure/run-ingestion-worker.sh]
        resources:
          cpu: 1.0
          memory: 2Gi
        env:
          - name: ENVIRONMENT
            value: azure
          - name: DATABASE_URL
            secretRef: database-url
          - name: INGESTION_COUNTRY
            value: chile
          - name: ENABLE_SCHEDULER
            value: "false"
          - name: AUTO_SEND_ALERTS
            value: "false"
          - name: ENABLE_MENOR8_MODULE
            value: "false"
